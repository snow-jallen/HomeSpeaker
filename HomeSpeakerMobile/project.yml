name: HomeSpeakerMobile
options:
  bundleIdPrefix: com.homespeaker
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

configs:
  Debug: debug
  Release: release

targets:
  HomeSpeaker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Shared
        createIntermediateGroups: true
      - path: iOS
        createIntermediateGroups: true
        excludes:
          - Resources
    resources:
      - path: iOS/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homespeaker.ios
        INFOPLIST_FILE: iOS/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: HomeSpeakerWatch
        embed: true

  HomeSpeakerWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Shared
        createIntermediateGroups: true
      - path: watchOS
        createIntermediateGroups: true
        excludes:
          - Resources
    resources:
      - path: watchOS/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homespeaker.watchos
        INFOPLIST_FILE: watchOS/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
        ENABLE_PREVIEWS: YES
        WK_COMPANION_APP_BUNDLE_IDENTIFIER: com.homespeaker.ios
